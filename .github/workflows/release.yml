name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-setup:
    name: Build setup executables
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build all targets
        working-directory: scripts
        run: bun run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: setup-executables
          path: scripts/dist/mailpal-setup-*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-setup

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: setup-executables
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum mailpal-setup-linux-x64 mailpal-setup-linux-arm64 mailpal-setup-macos-x64 mailpal-setup-macos-arm64 mailpal-setup-windows-x64.exe > mailpal-setup-checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ contains(inputs.tag, '-') }}
          generate_release_notes: true
          files: |
            dist/mailpal-setup-linux-x64
            dist/mailpal-setup-linux-arm64
            dist/mailpal-setup-macos-x64
            dist/mailpal-setup-macos-arm64
            dist/mailpal-setup-windows-x64.exe
            dist/mailpal-setup-checksums.txt

