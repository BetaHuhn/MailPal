<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e2344"/>
      <stop offset="100%" stop-color="#121527"/>
    </linearGradient>
    <linearGradient id="env" x1="11" y1="18" x2="11" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#272c52"/>
      <stop offset="100%" stop-color="#1d2248"/>
    </linearGradient>
    <linearGradient id="flap" x1="11" y1="18" x2="53" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#44e8d0"/>
      <stop offset="100%" stop-color="#23c4ac"/>
    </linearGradient>
    <clipPath id="ec">
      <rect x="11" y="18" width="42" height="30" rx="4"/>
    </clipPath>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="11" y="18" width="42" height="30" rx="4" fill="url(#env)"/>
  <rect x="11" y="18" width="42" height="30" rx="4" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.75"/>

  <!-- Bottom fold lines -->
  <g clip-path="url(#ec)">
    <path d="M 11 48 L 32 34 L 53 48" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.75"/>
  </g>

  <!-- Teal curved flap -->
  <g clip-path="url(#ec)">
    <path d="M 11 18 L 53 18 Q 32 46 11 18 Z" fill="url(#flap)"/>
    <path d="M 11 18 Q 32 46 53 18" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.75"/>
  </g>
</svg>
